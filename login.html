<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="description"
      content="DSIS is a data signal identification system that delivers seamless and accurate signal management around the clock. Tailored to your specific operational needs, it optimizes performance and efficiency 365 days a year."
    />

    <!-- Always include this line of code!!! -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" href="img/dsis-favicon.png" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="apple-touch-icon" href="img/dsis-apple.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- <link rel="stylesheet" href="css/general.css" /> -->
    <!-- <link rel="stylesheet" href="css/style.css" /> -->
    <link rel="stylesheet" href="styles2.css" />
    <link rel="stylesheet" href="queries2.css" />
    <link rel="stylesheet" href="login.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />

    <script
      type="module"
      src="https://unpkg.com/ionicons@5.4.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule=""
      src="https://unpkg.com/ionicons@5.4.0/dist/ionicons/ionicons.js"
    ></script>

    <script
      defer
      src="https://unpkg.com/smoothscroll-polyfill@0.4.4/dist/smoothscroll.min.js"
    ></script>
    <script defer src="script2.js"></script>

    <title>DSIS &mdash; Never runout of data again!</title>
  </head>
  <body>
    <header class="header">
      <a href="#">
        <img class="logo" alt="DSIS logo" src="img/DSIS2-logo.png" />
      </a>

      <nav class="main-nav">
        <ul class="main-nav-list">
          <li>
            <a class="main-nav-link-btn nav-cta" href="index.html">Home</a>
          </li>
        </ul>
      </nav>

      <button class="btn-mobile-nav">
        <ion-icon class="icon-mobile-nav" name="menu-outline"></ion-icon>
        <ion-icon class="icon-mobile-nav" name="close-outline"></ion-icon>
      </button>
    </header>

    <div class="wrapper">
      <div class="card login-size">
        <!-- Login Form -->
        <div class="login-form">
          <h2>Login</h2>
          <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" placeholder="Email" />
          </div>
          <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" placeholder="Password" />
          </div>
          <a href="#" class="forgot-password">Forgot Password?</a>
          <button class="btn btn-login">Login</button>
          <p class="toggle-text">
            Don't have an account? <a href="#" class="toggle">Register Now</a>
          </p>
        </div>
      </div>
      <div class="content">
        <!-- Registration Form -->
        <h2>Registration</h2>
        <div class="input-group">
          <i class="fas fa-user"></i>
          <input type="text" placeholder="First Name" />
        </div>
        <div class="input-group">
          <i class="fas fa-user"></i>
          <input type="text" placeholder="Last Name" />
        </div>
        <div class="input-group">
          <i class="fas fa-envelope"></i>
          <input type="email" placeholder="Email" />
        </div>
        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" placeholder="Password" />
        </div>
        <button class="btn">Register</button>
        <p class="toggle-text">
          Already have an account? <a href="#" class="toggle">Login Now</a>
        </p>
      </div>
    </div>
    <script src="login.js"></script>
  </body>
</html>
